<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hourly Summary</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; margin-top: 18px; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f6f6f6; }
    input { padding:6px; }
  </style>
</head>
<body>
  <h2>Hourly Summary</h2>
  <p><a href="/">Dashboard</a> | <a href="/events">Events</a></p>

  <form method="get" action="/hourly">
    <label>Date (YYYY-MM-DD):</label>
    <input name="date" value="{{ date }}" />
    <button type="submit">Load</button>
  </form>

  <table>
    <tr><th>Date</th><th>Hour</th><th>Label</th><th>Direction</th><th>Count</th></tr>
    {% for r in rows %}
      <tr>
        <td>{{ r["date"] }}</td>
        <td>{{ r["hour"] }}</td>
        <td>{{ r["label"] }}</td>
        <td>{{ r["direction"] }}</td>
        <td>{{ r["count"] }}</td>
      </tr>
    {% endfor %}
  </table>
</body>
</html>
